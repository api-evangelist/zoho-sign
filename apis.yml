aid: zoho-sign
name: Zoho Sign
description: >-
  Zoho Sign is a cloud-based electronic signature platform that provides a REST
  API for sending documents for signature, managing templates, tracking signing
  status, and automating signature workflows. The API supports OAuth 2.0
  authentication and enables developers to create envelopes, manage recipients,
  configure signing fields, trigger bulk sends, and retrieve audit trails
  programmatically. Over 25,000 envelopes are sent daily through Zoho Sign APIs,
  covering use cases from simple document signing to embedded signing, in-person
  signing, and enterprise compliance workflows including 21 CFR Part 11 and QES.
